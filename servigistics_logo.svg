<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="sGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A651"/>
      <stop offset="100%" stop-color="#007A3D"/>
    </linearGradient>
  </defs>
  <!-- Stylized gear/cog mark -->
  <g transform="translate(12,50)">
    <!-- Outer ring arc suggesting a gear -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#sGreen)" stroke-width="5"/>
    <!-- Inner spokes -->
    <line x1="0" y1="-30" x2="0" y2="-18" stroke="url(#sGreen)" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="0" y2="30" stroke="url(#sGreen)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-30" y1="0" x2="-18" y2="0" stroke="url(#sGreen)" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="0" x2="30" y2="0" stroke="url(#sGreen)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-21" y1="-21" x2="-13" y2="-13" stroke="url(#sGreen)" stroke-width="5" stroke-linecap="round"/>
    <line x1="13" y1="13" x2="21" y2="21" stroke="url(#sGreen)" stroke-width="5" stroke-linecap="round"/>
    <line x1="21" y1="-21" x2="13" y2="-13" stroke="url(#sGreen)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-13" y1="13" x2="-21" y2="21" stroke="url(#sGreen)" stroke-width="5" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="7" fill="url(#sGreen)"/>
  </g>
  <!-- Wordmark -->
  <text x="58" y="58" font-family="'Arial', sans-serif" font-size="32" font-weight="700" fill="#007A3D" letter-spacing="-0.5">Servigistics</text>
  <!-- Tagline -->
  <text x="58" y="76" font-family="Arial, sans-serif" font-size="11" fill="#555" letter-spacing="0.5">Service Parts Intelligence</text>
</svg>
