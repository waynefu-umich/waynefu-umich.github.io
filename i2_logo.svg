<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 110" width="220" height="110">
  <!-- White background -->
  <rect width="220" height="110" fill="white"/>

  <!-- Brushstroke / calligraphic "i2" mark -->
  <!-- The "i" — thin upstroke with a distinctive dot -->
  <ellipse cx="52" cy="14" rx="5" ry="4.5" fill="#1a1a1a" transform="rotate(-8,52,14)"/>
  <!-- i stem — thin brushstroke going down-right -->
  <path d="M46 24 Q48 38 50 52 Q51 60 53 68" stroke="#1a1a1a" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- The "2" — flowing brushstroke -->
  <!-- Top curve of 2 -->
  <path d="M55 28 Q60 15 74 16 Q90 17 91 30 Q92 42 76 52 Q65 59 55 70 L93 70" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Slight thickening at bottom bar of 2 -->
  <path d="M54 70 L94 70" stroke="#1a1a1a" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- Underline / tail flourish extending right -->
  <path d="M94 70 Q130 65 160 55" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Black bar at bottom -->
  <rect x="0" y="80" width="220" height="30" fill="#1a1a1a"/>
  <text x="110" y="101" font-family="'Arial Narrow', Arial, sans-serif" font-size="13.5" font-weight="400" fill="white" text-anchor="middle" letter-spacing="3">i2 Technologies</text>
</svg>
