<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="340" height="100">
  <!-- White background -->
  <rect width="340" height="100" fill="white"/>

  <!-- Servigistics swirl "S" mark -->
  <!-- The S is made of two overlapping crescent/spiral shapes in crimson/dark red -->
  <!-- Top part of S — upper left crescent -->
  <path d="M50 22 C50 10 62 5 72 8 C83 11 88 20 84 30 C81 37 72 40 64 44 C56 48 48 54 48 64 C48 76 58 84 70 83 C82 82 90 74 88 65"
        stroke="#C41E3A" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Overlap shadow to create depth on the S -->
  <path d="M70 38 C62 42 54 49 52 58"
        stroke="#9B1528" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- SERVIGISTICS wordmark -->
  <text x="112" y="57" font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="30" font-weight="700" fill="#1B3A6B"
        letter-spacing="2">SERVIGISTICS</text>
  <!-- Trademark symbol -->
  <text x="316" y="38" font-family="Arial, sans-serif" font-size="14" fill="#1B3A6B" font-weight="400">™</text>
</svg>
